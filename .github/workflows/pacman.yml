name: Generate Pacman Retro

on:
  schedule:
    - cron: "0 */24 * * *" # Roda todo dia
  workflow_dispatch: # Permite rodar manualmente
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Pacman Animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pacman-contribution-graph.svg?color_snake=#f7df1e&color_dots=#bfbdbe&snake_type=pacman
            dist/pacman-contribution-graph-dark.svg?palette=github-dark&color_snake=#f7df1e&snake_type=pacman

      - name: Push to Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Generate PAC-MAN contribution graph

on:
  schedule:
    - cron: "0 0 * * *"  # Roda todo dia
  workflow_dispatch:     # Permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: lowlighter/metrics@latest
        with:
          filename: pacman-contribution-graph.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_pacman: yes
          plugin_pacman_animation: yes  # ATIVA ANIMAÇÃO!
          plugin_pacman_background: yes
          
      - name: Upload to pacman-output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: pacman-output
          publish_dir: ./
          destination_dir: ./
          keep_files: false

name: Generate Pacman

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: 

jobs:
  build:
   runs-on: ubuntu-latest
   steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Generate Pacman
      uses: lowlighter/metrics@latest
      with:
        token: ${{ github.token }}
        user: RicardoNevees
        template: classic
        base: ""
        config_timezone: America/Fortaleza
        plugin_isocalendar: yes
        plugin_isocalendar_duration: half-year
          
